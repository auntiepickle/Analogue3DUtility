name: release

# Builds one-file binaries for Windows, macOS, and Linux and attaches them to
# the GitHub Release whenever a version tag (vX.Y.Z) is pushed. Can also be run
# manually (workflow_dispatch) to produce build artifacts without releasing.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    env:
      # Set this repo secret (after SignPath Foundation approval) to enable
      # Windows code signing; until then the signing step below is a no-op.
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            ext: ".exe"
            asset: a3d-windows.exe
          - os: macos-latest
            label: macos
            ext: ""
            asset: a3d-macos
          - os: ubuntu-latest
            label: linux
            ext: ""
            asset: a3d-linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build one-file binary
        run: >
          pyinstaller --onefile --name a3d
          --collect-submodules analogue3d
          --collect-all rich
          --collect-all questionary
          --hidden-import hid
          a3d.py

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p out
          cp "dist/a3d${{ matrix.ext }}" "out/${{ matrix.asset }}"

      - name: Upload build artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

      # Windows code signing via SignPath Foundation (free for OSS). Runs only on
      # tags when SIGNPATH_API_TOKEN is set; otherwise skipped (unsigned build).
      - name: Code sign (Windows, SignPath)
        if: matrix.label == 'windows' && env.SIGNPATH_API_TOKEN != '' && startsWith(github.ref, 'refs/tags/')
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: analogue-3d-utility
          signing-policy-slug: release-signing
          github-artifact-id: ${{ steps.upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Prefer the signed binary if signing ran
        if: matrix.label == 'windows'
        shell: bash
        run: |
          if [ -f "signed/${{ matrix.asset }}" ]; then
            cp "signed/${{ matrix.asset }}" "out/${{ matrix.asset }}"
            echo "Attaching signed binary."
          fi

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/${{ matrix.asset }}
