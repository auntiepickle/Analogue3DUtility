<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240" role="img" aria-label="Analogue 3D Utility">
  <title>Analogue 3D Utility</title>

  <!-- backdrop: pure-black with a thin surface frame (A3D-Manager style) -->
  <rect width="820" height="240" fill="#0a0a0a"/>
  <rect x="1.5" y="1.5" width="817" height="237" fill="none" stroke="#1f1f1f" stroke-width="3" rx="6"/>

  <!-- faint pixel grid in the lower-right, for retro texture -->
  <g fill="#141414">
    <rect x="612" y="196" width="10" height="10"/><rect x="632" y="196" width="10" height="10"/>
    <rect x="652" y="196" width="10" height="10"/><rect x="672" y="206" width="10" height="10"/>
    <rect x="692" y="196" width="10" height="10"/><rect x="712" y="206" width="10" height="10"/>
    <rect x="732" y="196" width="10" height="10"/><rect x="752" y="196" width="10" height="10"/>
    <rect x="772" y="206" width="10" height="10"/>
  </g>

  <!-- pixel-art N64 cartridge (gold) -->
  <g transform="translate(58,54)">
    <!-- shoulders + body -->
    <rect x="12" y="8" width="68" height="26" rx="4" fill="#F4CD01"/>
    <rect x="0" y="28" width="92" height="108" rx="6" fill="#F4CD01"/>
    <!-- top grip notch (cut back to black) -->
    <rect x="30" y="0" width="32" height="16" fill="#0a0a0a"/>
    <!-- recessed label window -->
    <rect x="13" y="46" width="66" height="60" rx="3" fill="#0a0a0a"/>
    <!-- pixel "label art" -->
    <g fill="#F4CD01">
      <rect x="22" y="54" width="11" height="11"/><rect x="41" y="54" width="11" height="11"/><rect x="60" y="54" width="11" height="11"/>
      <rect x="31" y="71" width="11" height="11"/><rect x="50" y="71" width="11" height="11"/>
      <rect x="22" y="88" width="11" height="11"/><rect x="60" y="88" width="11" height="11"/>
    </g>
    <!-- bottom edge connector -->
    <rect x="20" y="120" width="52" height="8" fill="#0a0a0a"/>
  </g>

  <!-- wordmark -->
  <text x="190" y="100" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="52" font-weight="800" letter-spacing="1" fill="#F4CD01">ANALOGUE 3D</text>

  <!-- gold pill (echoes A3D-Manager's active-tab pill) -->
  <g transform="translate(192,120)">
    <rect width="138" height="32" rx="16" fill="#F4CD01"/>
    <text x="69" y="22" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif"
          font-size="15" font-weight="800" letter-spacing="5" fill="#0a0a0a">UTILITY</text>
  </g>

  <!-- green status dots, like the tool's "SD card detected" indicators -->
  <g font-family="'Consolas','DejaVu Sans Mono',monospace" font-size="14" fill="#9a9a9a">
    <circle cx="198" cy="186" r="5" fill="#4ade80"/><text x="210" y="191">firmware</text>
    <circle cx="312" cy="186" r="5" fill="#4ade80"/><text x="324" y="191">art packs</text>
    <circle cx="446" cy="186" r="5" fill="#4ade80"/><text x="458" y="191">saves</text>
    <circle cx="540" cy="186" r="5" fill="#4ade80"/><text x="552" y="191">8BitDo 64</text>
  </g>

  <text x="788" y="44" text-anchor="end" font-family="'Consolas',monospace" font-size="13" fill="#555">v1.0</text>
</svg>
